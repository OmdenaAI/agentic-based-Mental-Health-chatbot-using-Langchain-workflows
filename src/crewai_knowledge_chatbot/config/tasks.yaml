chat_task:
  description: >
    Initiate and manage the flow of the conversation.
    If no issue is detected, ask a general wellness question sourced from mental health materials.
    Use the conversation to build your response to the user:

    {history}

    Listen to the user and respond empathetically to: '{user_message}'
  expected_output: >
    Your response should be a empathetic, relevant, accurate, and engaging. 
    It directly addresses the {user_message} or continue the conversation logically.
  agent: assistant

summarizer_task:
  description: >
    Tracks and provides a summary of the conversation between the user and the assistant.
  expected_output: >
    Your response should be a summary of the user's mood, including any patterns or 
    changes observed over time.
  agent: summarizer

expert_task:
  description: >
    Provide fact-based mental health guidance based on {user_message} 
    using trusted documents and web data.
  expected_output: >
    Your response should be a clear, compassionate, and informative answer to the {user_message}.
    It should include relevant information from reputable sources.
  agent: expert